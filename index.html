<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AETHER | WHITE-PREDICT V1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #L_O { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .FLASH { font-family: 'Orbitron', sans-serif; font-size: 80px; text-shadow: 0 0 50px #fff; animation: strike 0.2s infinite; }
        @keyframes strike { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="L_O">
        <input type="password" id="_PASS" placeholder="WHITE_KEY" class="bg-black border-b border-white/10 p-4 text-white text-center w-64 outline-none tracking-[10px]">
        <button onclick="_VAL()" class="mt-8 text-white/20 text-[8px] tracking-[5px] uppercase">Activate_Radar</button>
    </div>

    <div id="_SIGNAL" class="hidden">
        <div class="FLASH text-white">BRANCO</div>
    </div>

    <script>
        const _SP = window.speechSynthesis;
        let _ON = false, _LS = -1;

        function _VOZ(t) {
            _SP.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'pt-BR'; m.pitch = 0.9; m.rate = 2.3;
            _SP.speak(m);
        }

        function _VAL() {
            if(document.getElementById('_PASS').value === "jarvis102") {
                document.getElementById('L_O').style.display = 'none';
                _ON = true; _VOZ("Radar de Brancos em varredura profunda.");
                _RADAR();
            }
        }

        function _RADAR() {
            if(!_ON) return;
            const n = new Date(), s = n.getSeconds(), m = n.getMinutes();
            if(s !== _LS) {
                _LS = s;
                // Lógica de Vácuo Preditiva 04:00 AM
                const p = (m % 4 === 0 || m % 9 === 0) && (s === 12 || s === 32 || s === 52);
                if(p) {
                    _VOZ("Alvo Branco Detectado.");
                    document.getElementById('_SIGNAL').classList.remove('hidden');
                    setTimeout(() => { document.getElementById('_SIGNAL').classList.add('hidden'); }, 9000);
                }
            }
            requestAnimationFrame(_RADAR);
        }
    </script>
</body>
</html>
